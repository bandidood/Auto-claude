services:
  auto-claude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-claude
    restart: unless-stopped

    # Variables d'environnement — à remplir dans Coolify ou .env
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}
      - ALLOWED_CHAT_IDS=${ALLOWED_CHAT_IDS:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROJECT_ROOT=/workspace
      # Chrome installé dans /opt/puppeteer au moment du build Docker
      - PUPPETEER_CACHE_DIR=/opt/puppeteer

    volumes:
      # ── Bind mounts explicites — persistance réelle entre redémarrages ────────
      # Les dossiers host sont créés automatiquement par Docker si absents.
      # Inspectables directement sur le VPS sous /data/coolify/volumes/

      # Base SQLite : conversations, mémoire, tâches planifiées
      - /data/coolify/volumes/auto-claude-store:/app/store

      # Workspace que Claude Code peut lire/écrire
      - /data/coolify/volumes/auto-claude-workspace:/workspace

      # Auth Claude Code (.credentials.json, settings.json, sessions)
      # ⚠️  User dans le container = 'claude' (uid 1001, HOME=/home/claude)
      #     → destination /home/claude/.claude  (PAS /root/.claude)
      - /data/coolify/volumes/auto-claude-auth:/home/claude/.claude

      # Session WhatsApp Web — QR code scanné une seule fois
      - /data/coolify/volumes/auto-claude-wa:/app/store/wa-session

      # Fichier de session global Claude Code (OAuth)
      - /data/coolify/volumes/auto-claude-session-json:/home/claude/.claude.json

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
