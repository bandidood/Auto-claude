services:
  auto-claude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-claude
    restart: unless-stopped

    # Variables d'environnement — à remplir dans Coolify ou .env
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}
      - ALLOWED_CHAT_IDS=${ALLOWED_CHAT_IDS:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROJECT_ROOT=/workspace
      # Puppeteer/Chrome installé dans /opt/puppeteer au moment du build
      - PUPPETEER_CACHE_DIR=/opt/puppeteer

    volumes:
      # Base SQLite (conversations, mémoire, tâches planifiées)
      - store-data:/app/store

      # Workspace que Claude Code peut lire/écrire
      - workspace-data:/workspace

      # ✅ CORRIGÉ : sessions Claude Code → HOME de l'user 'claude' = /home/claude
      # (avant c'était /root/.claude → mauvais user → sessions perdues au redémarrage)
      - claude-sessions:/home/claude/.claude

      # Session WhatsApp (QR scanné → persistée entre redémarrages)
      - wa-session:/app/store/wa-session

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  store-data:
    driver: local
  workspace-data:
    driver: local
  # Sessions Claude Code CLI (authentification Anthropic + historique)
  claude-sessions:
    driver: local
  # Session WhatsApp Web (QR code scanné une seule fois)
  wa-session:
    driver: local
